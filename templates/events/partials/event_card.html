<a href="/events/{{ event.slug }}/" class="group block bg-white rounded-xl border border-gray-200 hover:border-indigo-300 hover:shadow-md transition-all overflow-hidden">
  {% if event.banner %}
    <img src="{{ event.banner.url }}" alt="{{ event.title }}" class="w-full h-44 object-cover">
  {% else %}
    <div class="w-full h-44 flex items-center justify-center
      {% if event.status == 'published' %}bg-gradient-to-br from-indigo-50 to-indigo-100
      {% elif event.status == 'draft' %}bg-gradient-to-br from-amber-50 to-amber-100
      {% else %}bg-gradient-to-br from-gray-50 to-gray-100{% endif %}">
      <svg class="w-12 h-12 {% if event.status == 'published' %}text-indigo-200{% elif event.status == 'draft' %}text-amber-200{% else %}text-gray-300{% endif %}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
    </div>
  {% endif %}

  <div class="p-4">
    <div class="flex items-center justify-between mb-2">
      <span class="text-xs font-semibold px-2 py-0.5 rounded-full
        {% if event.status == 'published' %}bg-green-100 text-green-700
        {% elif event.status == 'draft' %}bg-amber-100 text-amber-700
        {% else %}bg-red-100 text-red-600{% endif %}">
        {{ event.get_status_display }}
      </span>
      <span class="text-xs text-gray-400">{{ event.max_attendees }} seats</span>
    </div>

    <h3 class="font-semibold text-gray-900 leading-snug group-hover:text-indigo-600 transition-colors line-clamp-2">{{ event.title }}</h3>
    <p class="text-xs text-gray-500 mt-1 truncate">{{ event.venue_name }}</p>

    <div class="mt-3 pt-3 border-t border-gray-100 flex items-center justify-between">
      <p class="text-xs text-gray-400">
        {{ event.start_date|date:"M d" }} — {{ event.end_date|date:"M d, Y" }}
      </p>
      <p class="text-xs text-gray-400 truncate ml-2">{{ event.organizer.name }}</p>
    </div>
  </div>
</a>
