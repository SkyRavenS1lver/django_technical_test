<div id="event-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
  {% for event in events %}
    {% include "events/partials/event_card.html" with event=event %}
  {% empty %}
    <div class="col-span-full text-center py-16 text-gray-400">
      <p class="text-lg font-medium">No events found</p>
      {% if user.is_organizer %}
        <a href="/events/create/" class="mt-3 inline-block text-sm text-indigo-600 hover:underline">Create the first one</a>
      {% endif %}
    </div>
  {% endfor %}
</div>
