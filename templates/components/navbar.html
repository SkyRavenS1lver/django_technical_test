<nav class="bg-white shadow-sm border-b border-gray-200">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16 items-center">
      <a href="/" class="text-xl font-bold text-indigo-600">EventHub</a>
      <div class="flex items-center gap-4">
        {% if user.is_authenticated %}
          {% if user.is_organizer %}
            <a href="/events/create/" class="text-sm font-medium text-indigo-600 hover:text-indigo-800">+ New Event</a>
          {% endif %}
          <a href="/dashboard/" class="text-sm text-gray-600 hover:text-gray-900">Dashboard</a>
          <form method="post" action="/auth/logout/" class="inline">
            {% csrf_token %}
            <button type="submit" class="text-sm text-gray-500 hover:text-gray-700">Logout</button>
          </form>
        {% else %}
          <a href="/auth/login/" class="text-sm text-gray-600 hover:text-gray-900">Login</a>
          <a href="/auth/register/" class="bg-indigo-600 text-white text-sm px-4 py-2 rounded-md hover:bg-indigo-700">Register</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
