{% extends "base.html" %}
{% block title %}Dashboard — EventHub{% endblock %}

{% block content %}
<div class="mb-8">
  <h1 class="text-2xl font-bold text-gray-900">Welcome, {{ user.name }}</h1>
  <p class="text-gray-500 text-sm mt-1">{{ user.email }}</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
  <div class="bg-white rounded-xl border border-gray-200 p-6">
    <h2 class="text-lg font-semibold text-gray-800 mb-4">My Registrations</h2>
    <p class="text-sm text-gray-500">Your event registrations will appear here.</p>
  </div>

  {% if user.is_organizer %}
  <div class="bg-white rounded-xl border border-gray-200 p-6">
    <h2 class="text-lg font-semibold text-gray-800 mb-4">My Events</h2>
    <a href="/events/create/" class="inline-block mt-2 text-sm text-indigo-600 hover:text-indigo-800 font-medium">+ Create new event</a>
  </div>
  {% endif %}
</div>
{% endblock %}
