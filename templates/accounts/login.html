{% extends "base.html" %}
{% block title %}Login — EventHub{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="w-full max-w-md">
    <h1 class="text-2xl font-bold text-gray-900 text-center mb-8">Sign in to your account</h1>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
      <div id="form-error" class="hidden mb-4 p-3 bg-red-50 text-red-700 text-sm rounded-md border border-red-200"></div>

      <form id="login-form"
            hx-post="/auth/login/submit/"
            hx-target="#form-error"
            hx-swap="outerHTML"
            hx-indicator="#login-btn"
            class="space-y-5">
        {% csrf_token %}

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email"
                 class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password"
                 class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

        <button id="login-btn" type="submit"
                class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md text-sm font-medium hover:bg-indigo-700 disabled:opacity-50">
          Sign in
        </button>
      </form>

      <p class="mt-5 text-center text-sm text-gray-500">
        Don't have an account?
        <a href="/auth/register/" class="text-indigo-600 hover:text-indigo-800 font-medium">Register</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
